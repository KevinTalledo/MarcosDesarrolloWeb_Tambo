<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="../Diseño_Pag_Principales/Diseño_Login.css">
    <title>Document</title>
</head>
<body>
<section class="py-5">
    <div class="container  rounded">
        <div class="row g-4 justify-content-center">

            <div class="col-lg-7">
                <div class="contact-card">
                    <h2 class="fw-bold mb-1">Registrar postulacion</h2>
                    <p class="text-muted mb-4">Ingrese sus datos en el orden solicitado</p>            

                    <form action="login" method="post" id="login-form">
                        <div class="row g-3">
                            <div class="col-sm-12">
                                <label class="form-label fw-medium">Nombre completo<span class="text-danger"></span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-person" style="color:var(--brand)"></i></span>
                                    <input type="text" class="form-control" placeholder="Rodigo Manuel" required>                                        
                                </div>  
                            </div>
                            <div class="col-sm-12">
                                <label class="form-label fw-medium">Apellidos completos<span class="text-danger"></span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-person" style="color:var(--brand)"></i></span>
                                    <input type="text" class="form-control" placeholder="Paredez Caceres" required>                                        
                                </div>  
                            </div> 
                            <div class="col-sm-12">
                                <label class="form-label fw-medium">DNI<span class="text-danger"></span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-file-earmark-person" style="color:var(--brand)"></i></span>
                                    <input type="number" class="form-control" placeholder="12345678" required>                                        
                                </div>  
                            </div> 
                            <div class="col-sm-12">
                                <label class="form-label fw-medium">Fecha de nacimiento<span class="text-danger"></span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-calendar-date" style="color:var(--brand)"></i></span>
                                    <input type="date" class="form-control" placeholder="" required>                                        
                                </div>  
                            </div>
                            <div class="col-sm-12">
                                <label class="form-label fw-medium">Email de contacto<span class="text-danger"></span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-envelope" style="color:var(--brand)"></i></span>
                                    <input type="email" class="form-control" placeholder="ejemplo@correo.com" required>                                        
                                </div>  
                            </div>
                            <div class="col-sm-12">
                                <label class="form-label fw-medium">Numero de contacto<span class="text-danger"></span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-phone" style="color:var(--brand)"></i></span>
                                    <input type="number" class="form-control" placeholder="999888777" required>                                        
                                </div>  
                            </div>
                            <div class="col-sm-12">
                                <label class="form-label fw-medium">Distrito de Residencia<span class="text-danger"></span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-house" style="color:var(--brand)"></i></span>
                                    <input type="text" class="form-control" placeholder="San Juan de Lurigancho" required>                                        
                                </div>  
                            </div>
                            <div class="col-sm-12">
                                <label class="form-label fw-medium">Nombre de usuario<span class="text-danger"></span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-person" style="color:var(--brand)"></i></span>
                                    <input type="text" class="form-control" placeholder="RodrigoMaximiliano23" required>                                        
                                </div>                          
                            </div>
                            <div class="col-sm-12">
                                <label class="form-label fw-medium">Contraseña<span class="text-danger"></span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-lock" style="color:var(--brand)"></i></span>
                                    <input type="password" class="form-control" placeholder="********" required>                                        
                                </div>
                            </div>                                
                            <div class="col-12 d-grid">
                                <button type="submit" class="btn btn-accent btn-lg bg-secondary btn btn-outline-light">
                                    <i class="bi bi-envelope-arrow-up-fill"></i>  Registrar datos de postulacion
                                </button>
                            </div>

                        </div>                    
                    </form>                
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
