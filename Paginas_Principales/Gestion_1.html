<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title> TAMBO Formulario de Postulación </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5">
  <div class="card shadow p-4">
    
    <h3 class="text-center mb-4">Formulario de Postulación</h3>

    <form>

      <!-- DATOS PERSONALES -->
      <h5 class="mb-3">A. Datos Personales</h5>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Nombre completo</label>
          <input type="text" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">DNI</label>
          <input type="text" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Fecha de nacimiento</label>
          <input type="date" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Edad</label>
          <input type="number" class="form-control">
        </div>
        
        <div class="col-md-6 mb-3">
          <label class="form-label">Teléfono</label>
          <input type="tel" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control">
        </div>

        <div class="col-md-12 mb-3">
          <label class="form-label">Distrito de residencia</label>
          <input type="text" class="form-control">
        </div>
      </div>

      <hr>

      <!-- INFORMACIÓN LABORAL -->
      <h5 class="mb-3">B. Información Laboral</h5>

      <!-- Puesto (select) -->
      <div class="mb-3">
        <label class="form-label">Puesto</label>
        <select class="form-select">
          <option selected disabled>Selecciona una opción</option>
          <option>Atención en caja</option>
          <option>Atención en tienda</option>
          <option>Multifuncional</option>
        </select>
      </div>

      <!-- Disponibilidad horaria (radio) -->
      <div class="mb-3">
        <label class="form-label">Disponibilidad horaria</label><br>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="horario">
          <label class="form-check-label">Mañana</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="horario">
          <label class="form-check-label">Tarde</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="horario">
          <label class="form-check-label">Noche</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="horario">
          <label class="form-check-label">Rotativo</label>
        </div>
      </div>

      <!-- Disponibilidad inmediata -->
      <div class="mb-3">
        <label class="form-label">Disponibilidad inmediata</label>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="disponibilidad">
          <label class="form-check-label">Sí</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="disponibilidad">
          <label class="form-check-label">No</label>
        </div>
      </div>

      <!-- Experiencia -->
      <div class="mb-3">
        <label class="form-label">¿Has trabajado en atención al cliente?</label>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="experiencia">
          <label class="form-check-label">Sí</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="experiencia">
          <label class="form-check-label">No</label>
        </div>
      </div>

      <!-- Nivel de estudios -->
      <div class="mb-3">
        <label class="form-label">Nivel de estudios</label>
        <select class="form-select">
          <option selected disabled>Selecciona una opción</option>
          <option>Secundaria completa</option>
          <option>Técnico</option>
          <option>Universitario</option>
        </select>
      </div>

      <!-- Habilidades -->
      <div class="mb-3">
        <label class="form-label">Habilidades</label>

        <div class="form-check">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label">Atención al cliente</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label">Trabajo en equipo</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label">Manejo de caja</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label">Comunicación efectiva</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox">
          <label class="form-check-label">Ventas</label>
        </div>
      </div>

      <!-- Botón -->
      <button type="submit" class="btn btn-primary w-100">Enviar evaluación</button>

    </form>
  </div>
</div>

</body>
</html>
